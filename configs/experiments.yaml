data_version: "dvc-tracked-raw-heart-disease-v1"

experiments:
  - name: "rf_100_depth_none"
    model_type: "random_forest"
    n_estimators: 100
    max_depth: null

  - name: "rf_200_depth_none"
    model_type: "random_forest"
    n_estimators: 200
    max_depth: null

  - name: "rf_300_depth_10"
    model_type: "random_forest"
    n_estimators: 300
    max_depth: 10

  - name: "lr_balanced"
    model_type: "logistic_regression"
    max_iter: 5000
    class_weight: "balanced"

  - name: "lr_unbalanced"
    model_type: "logistic_regression"
    max_iter: 5000
    class_weight: null
